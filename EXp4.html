<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Result Card</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      display: flex;
      
    }
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      width: 350px;
    }
    h2 {
      text-align: center;
      color: #333;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
    .result {
      margin-top: 20px;
      padding: 10px;
      background: #e9f5e9;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Student Result Card</h2>
    <label>Student Name:</label>
    <input type="text" id="name">

    <label>Roll Number:</label>
    <input type="text" id="roll">

    <label>Math Marks:</label>
    <input type="number" id="math">

    <label>Science Marks:</label>
    <input type="number" id="science">

    <label>English Marks:</label>
    <input type="number" id="english">

    <button onclick="calculateResult()">calculate Result</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    function calculateResult() {
      let math = parseInt(document.getElementById("math").value) || 0;
      let science = parseInt(document.getElementById("science").value) || 0;
      let english = parseInt(document.getElementById("english").value) || 0;

      let total = math + science + english;
      let percentage = (total / 3).toFixed(2);

      let grade;
      if (percentage >= 90) grade = "A+";
      else if (percentage >= 75) grade = "A";
      else if (percentage >= 60) grade = "B";
      else if (percentage >= 40) grade = "C";
      else grade = "Fail";

      document.getElementById("result").innerHTML = `
        <strong>Name:</strong> ${name} <br>
        <strong>Roll No:</strong> ${roll} <br>
        <strong>Total Marks:</strong> ${total} <br>
        <strong>Percentage:</strong> ${percentage}% <br>
        <strong>Grade:</strong> ${grade}
      `;
    }
  </script>
</body>
</html>
